<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios mis datos</title>
    <style>
        table, td {
            font-family: verdana;
            border: 3px solid black;
            border-collapse: collapse;
            color: blue;
        }
        td {
            padding: 8px;
            text-align: left;
        }
        h3 {
            font-family: courier;
            color: red;
            font-size: 200%;
            text-align: center;
        }
        body {
            background-color: powderblue;
        }
        .btn-container {
            text-align: center;
        }
    </style>
</head>
<body>

    <h3>Registrar tus datos</h3>
    
    <center>
    <form method="post" action="#">
        <table>
            <tr>
                <td>Nombre:</td>
                <td><input type="text" name="nom" required maxlength="40"></td>
            </tr>
            <tr>
                <td>Edad:</td>
                <td><input type="number" name="eda" min="18" max="99" required></td>
            </tr>
            <tr>
                <td>Correo:</td>
                <td><input type="email" name="ema"></td>
            </tr>
            <tr>
                <td>Contraseña:</td>
                <td><input type="password" name="contr"></td>
            </tr>
            <tr>
                <td>Fecha de Nacimiento:</td>
                <td><input type="date" name="nac" required></td>
            </tr>
            <tr>
                <td>Teléfono (123-123-1234):</td>
                <td><input type="tel" name="tel" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"></td>
            </tr>
            <tr>
                <td>Color favorito:</td>
                <td><input type="color" name="col"></td>
            </tr>
            <tr>
                <td>Sube tu foto:</td>
                <td><input type="file" name="foto"></td>
            </tr>
            <tr>
                <td rowspan="4">Hago uso de:</td>
            </tr>
            <tr>
                <td><input type="checkbox" name="uso1" value="computadora"> Computadora</td>
            </tr>
            <tr>
                <td><input type="checkbox" name="uso2" value="tablet"> Tablet</td>
            </tr>
            <tr>
                <td><input type="checkbox" name="uso3" value="celular"> Celular</td>
            </tr>
            <tr>
                <td colspan="2" class="btn-container">
                    <input type="submit" value="Guardar">
                    <input type="reset" value="Borrar">
                </td>
            </tr>
        </table>
    </form>
    <br>
    <a href="index.html">Regresar</a>
    </center>

</body>
</html>
