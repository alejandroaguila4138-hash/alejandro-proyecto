<!DOCTYPE html>
<html>
<head>
<title>API ChatGPT</title>
</head>
<body>

<h2>Chatgpt API</h2>

<input type="text" id="msg" placeholder="Escribe tu pregunta">
<button onclick="enviarChat()">Consultar</button>

<p id="resp"></p>

<script>
async function enviarChat() {
    const prompt = document.getElementById("msg").value;
    const resp = document.getElementById("resp");

    if (!prompt) return;

    resp.innerText = "Pensando...";

    try {
        // Llamamos a nuestro puente JSP seguro enviando la pregunta en la URL
        const response = await fetch("controlador-chatgpt.jsp?pregunta=" + encodeURIComponent(prompt));
        
        const data = await response.json();

        // Verificamos si el JSP nos mandó un error (ej. falta la API Key)
        if (data.error) {
            resp.innerText = "Error: " + data.error;
            return;
        }

        // Extraemos la respuesta exacta de la estructura de OpenAI
        resp.innerText = data.choices[0].message.content;

    } catch (err) {
        resp.innerText = "Error de conexión: " + err;
    }
}
</script>

</body>
</html>
