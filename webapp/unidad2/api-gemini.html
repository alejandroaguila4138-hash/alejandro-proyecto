<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Gemini</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .ia-content {
            background: #ffffff;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e1e4e8;
        }
        h3 { margin: 0 0 20px 0; color: #1a1a1a; font-weight: 600; display: flex; align-items: center; gap: 12px; font-size: 1.4rem; }
        .input-group { position: relative; margin-bottom: 15px; }
        textarea { width: 100%; min-height: 120px; padding: 15px; border: 2px solid #edf2f7; border-radius: 12px; font-family: inherit; font-size: 15px; resize: none; box-sizing: border-box; transition: all 0.3s ease; background-color: #f8fafc; }
        textarea:focus { outline: none; border-color: #2563eb; background-color: #fff; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        .btn-gemini { background-color: #2563eb; color: white; border: none; padding: 14px 24px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 10px; transition: transform 0.2s, background 0.2s; }
        .btn-gemini:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        .response-card { margin-top: 25px; padding: 18px; background-color: #f1f5f9; border-radius: 12px; color: #334155; font-size: 15px; line-height: 1.6; border: 1px solid #e2e8f0; white-space: pre-wrap; }
        .loading-text { color: #64748b; font-style: italic; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div class="ia-content">
        <h3>
            <i class="fa-solid fa-wand-magic-sparkles" style="color:#2563eb"></i>
            Gemini Flash
        </h3>
        <div class="input-group">
            <textarea id="prompt" placeholder="¿En qué puedo ayudarte hoy?"></textarea>
        </div>
        <button class="btn-gemini" onclick="callGemini()">
            <i class="fa-solid fa-paper-plane"></i> Generar Respuesta
        </button>
        <div id="res" class="response-card">Esperando consulta...</div>
    </div>

    <script>
        async function callGemini() {
            const pregunta = document.getElementById('prompt').value;
            const outputDiv = document.getElementById('res');

            if (!pregunta) return;

            outputDiv.innerHTML = '<span class="loading-text"><i class="fa-solid fa-circle-notch fa-spin"></i> Procesando consulta...</span>';

            try {
                // Llamamos a nuestro puente JSP seguro
                const response = await fetch("controlador-gemini.jsp?pregunta=" + encodeURIComponent(pregunta));
                
                const data = await response.json();

                // Verificamos si el JSP nos mandó un error
                if (data.error) {
                    outputDiv.innerText = "Error: " + data.error;
                    return;
                }

                // Extraemos la respuesta de la estructura de Google
                outputDiv.innerText = data.candidates[0].content.parts[0].text;
                document.getElementById('prompt').value = '';

            } catch (e) {
                outputDiv.innerText = "Error de conexión: " + e.message;
            }
        }
    </script>
    <br>
    <a href="examen-unidad-2.html" style="display:block; text-align:center; margin-top:15px;">ir a examen</a>
</body>
</html>
